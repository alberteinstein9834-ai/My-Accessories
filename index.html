<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Accessories Store</title>
  <!-- Bootstrap 5 CSS + Icons + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #000000;
      margin: 0;
      padding: 0;
      color: #f0f0f0;
    }
    /* dark theme overrides */
    .bg-dark-custom {
      background-color: #050505 !important;
    }
    .card-bg-dark {
      background: #111111 !important;
      border: 1px solid #2a2a2a;
      transition: all 0.25s ease;
    }
    .card-bg-dark:hover {
      transform: translateY(-6px);
      border-color: #b8860b;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.8);
      background: #181818 !important;
    }
    .product-card {
      cursor: pointer;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
    }
    .category-btn {
      background: transparent;
      border: 1px solid #333;
      color: #ddd;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 40px;
      margin: 5px 6px;
      transition: all 0.2s;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
    }
    .category-btn:hover, .category-btn.active {
      background: #b8860b;
      border-color: #b8860b;
      color: #000000;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(184, 134, 11, 0.3);
    }
    .navbar-brand-custom {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e4c580, #b8860b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .gold-text {
      color: #d4af37;
    }
    .price-tag {
      font-weight: 700;
      font-size: 1.4rem;
      color: #f5c542;
    }
    .section-title {
      border-left: 5px solid #d4af37;
      padding-left: 18px;
      margin-bottom: 28px;
      font-weight: 700;
    }
    .modal-content-custom {
      background: #0f0f0f;
      border: 1px solid #2c2c2c;
      border-radius: 28px;
      color: white;
    }
    .btn-whatsapp {
      background-color: #25D366;
      border: none;
      font-weight: 600;
      padding: 12px 0;
      border-radius: 50px;
      color: #000;
      transition: 0.2s;
    }
    .btn-whatsapp:hover {
      background-color: #20b859;
      transform: scale(1.02);
      color: #000;
      box-shadow: 0 6px 14px rgba(37, 211, 102, 0.3);
    }
    footer {
      background: #030303;
      border-top: 1px solid #222;
    }
    .img-placeholder {
      background: #1e1e1e;
      object-fit: cover;
      width: 100%;
      height: 220px;
      transition: 0.2s;
    }
    .badge-cat {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    hr {
      opacity: 0.3;
    }
    .footer-link {
      color: #aaa;
      text-decoration: none;
      transition: 0.2s;
    }
    .footer-link:hover {
      color: #d4af37;
    }
    .social-icon {
      background: #1e1e1e;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: 0.2s;
      color: #ccc;
    }
    .social-icon:hover {
      background: #d4af37;
      color: #000;
      transform: translateY(-3px);
    }
    /* Navbar custom styles */
    .nav-categories-wrapper {
      background: #0a0a0a;
      border-radius: 60px;
      padding: 6px 12px;
      border: 1px solid #222;
    }
    .navbar-toggler-custom {
      background: #1a1a1a;
      border: 1px solid #b8860b;
      color: #d4af37;
    }
    .nav-link-custom {
      color: #ccc;
      transition: 0.2s;
      font-weight: 500;
    }
    .nav-link-custom:hover {
      color: #d4af37;
    }
    @media (max-width: 991px) {
      .category-scroll {
        margin-top: 1rem;
      }
      .nav-categories-wrapper {
        background: transparent;
        border: none;
        padding: 0;
      }
    }
  </style>
</head>
<body style="background:#000000">

<div id="root"></div>

<!-- React & ReactDOM & Babel -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  // ---------- CONFIGURATION ----------
  // Replace with your actual WhatsApp number (international format without '+' or with '+')
  const WHATSAPP_NUMBER = "923001234567";   // Pakistan demo number, change to your own
  // -----------------------------------

  // ---------- PRODUCT DATA (Men's accessories) ----------
  // Categories exactly from screenshot: BRACELET, PENDANT, EARRINGS, BINDS, BANDLES, NECKLACE, PIERCING SERVICES, FRAGRANCES
  const productsData = [
    { id: 1, name: "Warrior Leather Bracelet", category: "BRACELET", price: 1500, image: "https://picsum.photos/id/20/400/300", description: "Handcrafted genuine leather with steel clasp" },
    { id: 2, name: "Onyx Pendant Necklace", category: "BRACELET", price: 1500, image: "https://picsum.photos/id/26/400/300", description: "Black onyx stone, modern masculine style" },
    { id: 3, name: "Stealth Hoop Earrings", category: "EARRINGS", price: 1500, image: "https://picsum.photos/id/29/400/300", description: "Matte black hoops, surgical steel" },
    { id: 4, name: "Carbon Fiber Ring", category: "EARRINGS", price: 1500, image: "https://picsum.photos/id/36/400/300", description: "Ultra-light carbon fiber ring, comfort fit" },
    { id: 5, name: "Interlocking Bangle Set", category: "NECKLACE", price: 1500, image: "https://picsum.photos/id/42/400/300", description: "Set of 2 premium bangles, brushed finish" },
    { id: 6, name: "Cuban Chain Necklace", category: "NECKLACE", price: 1500, image: "https://picsum.photos/id/59/400/300", description: "Heavy curb chain, 18k gold plated" },
    { id: 7, name: "Ear Piercing Studio Service", category: "FRAGRANCES", price: 1500, image: "https://picsum.photos/id/64/400/300", description: "Professional piercing with sterilized equipment" },
    { id: 8, name: "Oud Noir Fragrance", category: "FRAGRANCES", price: 1500, image: "https://picsum.photos/id/82/400/300", description: "Woody, smoky scent, 50ml EDP" },
    { id: 9, name: "Titanium ID Bracelet", category: "BRACELET", price: 1500, image: "https://picsum.photos/id/96/400/300", description: "Engravable titanium with carbon accents" },
    { id: 10, name: "Arrowhead Pendant", category: "NECKLACE", price: 1500, image: "https://picsum.photos/id/124/400/300", description: "Vintage silver arrowhead, leather cord" },
    { id: 11, name: "Hex Screw Earrings", category: "EARRINGS", price: 1500, image: "https://picsum.photos/id/127/400/300", description: "Industrial design, black steel" },
    { id: 12, name: "Tungsten Carbide Ring", category: "FRAGRANCES", price: 1500, image: "https://picsum.photos/id/133/400/300", description: "Scratch-resistant, dome profile" },
    { id: 13, name: "Leather Wrap Bandle", category: "EARRINGS", price: 1500, image: "https://picsum.photos/id/143/400/300", description: "Braided leather & magnetic closure" },
    { id: 14, name: "Snake Chain Necklace", category: "NECKLACE", price: 1500, image: "https://picsum.photos/id/155/400/300", description: "Silver snake chain, 20 inches" },
    { id: 15, name: "Premium Cologne - Amber", category: "FRAGRANCES", price: 1500, image: "https://picsum.photos/id/169/400/300", description: "Long lasting aromatic fougère" }
  ];

  // Category list from screenshot + All
  const categoryList = ["ALL", "BRACELET", "EARRINGS", "NECKLACE", "FRAGRANCES"];

  // Main App Component
  const App = () => {
    const [selectedCategory, setSelectedCategory] = React.useState("ALL");
    const [modalVisible, setModalVisible] = React.useState(false);
    const [selectedProduct, setSelectedProduct] = React.useState(null);
    const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

    // Filter products based on category
    const filteredProducts = React.useMemo(() => {
      if (selectedCategory === "ALL") return productsData;
      return productsData.filter(product => product.category === selectedCategory);
    }, [selectedCategory]);

    // Handle product click -> open WhatsApp inquiry modal
    const handleProductClick = (product) => {
      setSelectedProduct(product);
      setModalVisible(true);
    };

    // Generate WhatsApp link with pre-filled message
    const getWhatsAppLink = () => {
      if (!selectedProduct) return "#";
      const message = `Hello AMX! I'm interested in *${selectedProduct.name}* (₨${selectedProduct.price.toLocaleString()}). Please share more details & availability.`;
      const encodedMsg = encodeURIComponent(message);
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMsg}`;
    };

    const closeModal = () => {
      setModalVisible(false);
      setSelectedProduct(null);
    };

    // Category filter buttons component (reused in navbar)
    const CategoryFilters = () => (
      <div className="category-scroll d-flex flex-nowrap flex-lg-wrap justify-content-start" style={{ gap: "4px" }}>
        {categoryList.map((cat) => (
          <button
            key={cat}
            className={`category-btn ${selectedCategory === cat ? 'active' : ''}`}
            onClick={() => setSelectedCategory(cat)}
          >
            {cat === "PIERCING SERVICES" ? "PIERCING" : cat}
          </button>
        ))}
      </div>
    );

    return (
      <div style={{ backgroundColor: "#000000", minHeight: "100vh" }}>
        {/* ========== NEW PROFESSIONAL NAVBAR WITH LOGO + CATEGORIES ========== */}
        <nav className="navbar navbar-expand-lg sticky-top" style={{ background: "#010101", borderBottom: "1px solid #222", padding: "0.5rem 0" }}>
          <div className="container">
            {/* Logo / Brand */}
            <a className="navbar-brand d-flex align-items-center gap-2" href="#" style={{ textDecoration: "none" }}>
              <span className="navbar-brand-custom display-6 fw-bold" style={{ fontSize: "1.9rem" }}><i >MY</i></span>
              <span style={{ height: "30px", width: "1px", background: "#333", margin: "0 5px" }}></span>
              <span className="text-white-50 fw-light" style={{ fontSize: "0.9rem", letterSpacing: "1px" }}>ACCESSORIES STORE</span>
            </a>

            {/* Mobile Toggle Button */}
            <button 
              className="navbar-toggler navbar-toggler-custom" 
              type="button" 
              onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
              style={{ background: "#111", border: "1px solid #b8860b", borderRadius: "12px", padding: "8px 12px" }}
            >
              <i className={`bi ${mobileMenuOpen ? 'bi-x-lg' : 'bi-grid-3x3-gap-fill'} gold-text`}></i>
            </button>

            {/* Collapsible content */}
            <div className={`collapse navbar-collapse ${mobileMenuOpen ? 'show' : ''}`} style={{ transition: "all 0.3s" }}>
              {/* Category Filters - integrated inside navbar */}
              <div className="nav-categories-wrapper ms-lg-4 flex-grow-1">
                <CategoryFilters />
              </div>
              
              {/* Additional Nav Icons / Actions */}
              <div className="d-flex gap-3 mt-3 mt-lg-0 ms-lg-3">
                <a href="#" className="nav-link-custom" style={{ fontSize: "1.2rem" }}><i className="bi bi-search"></i></a>
                <a href="#" className="nav-link-custom" style={{ fontSize: "1.2rem" }}><i className="bi bi-person"></i></a>
                <a href="https://wa.me/923001234567" target="_blank" className="nav-link-custom" style={{ fontSize: "1.2rem", color: "#25D366" }}><i className="bi bi-whatsapp"></i></a>
              </div>
            </div>
          </div>
        </nav>

      

        {/* LATEST COLLECTION Section */}
        <div className="container mt-4 mb-2">
          <div className="d-flex justify-content-between align-items-center flex-wrap">
            <h2 className="section-title text-white fs-2 fw-bold mb-0">⚡ LATEST COLLECTION</h2>
            <p className="text-secondary small mb-0">{filteredProducts.length} premium items</p>
          </div>
          <hr className="mt-2 mb-4" style={{ background: "#333" }} />
        </div>

        {/* Product Grid - Responsive Bootstrap Row */}
        <div className="container pb-5">
          <div className="row g-4">
            {filteredProducts.length === 0 ? (
              <div className="col-12 text-center py-5">
                <i className="bi bi-emoji-frown fs-1 text-secondary"></i>
                <p className="mt-3 text-secondary">No items in this category. Explore others!</p>
              </div>
            ) : (
              filteredProducts.map((product) => (
                <div key={product.id} className="col-12 col-sm-6 col-md-4 col-lg-3">
                  <div className="card product-card card-bg-dark h-100 border-0 rounded-4" onClick={() => handleProductClick(product)}>
                    <img 
                      src={product.image} 
                      className="card-img-top img-placeholder rounded-top-4" 
                      alt={product.name}
                      loading="lazy"
                      style={{ objectFit: "cover", height: "220px" }}
                    />
                    <div className="card-body d-flex flex-column">
                      <div className="d-flex justify-content-between align-items-start">
                        <span className="badge bg-dark badge-cat gold-text border border-secondary px-2 py-1 mb-2">{product.category}</span>
                      </div>
                      <h5 className="card-title text-white mt-1">{product.name}</h5>
                      <p className="card-text text-secondary small mb-2">{product.description.substring(0, 55)}...</p>
                      <div className="mt-auto d-flex justify-content-between align-items-center pt-2">
                        <span className="price-tag fw-bold">₨ {product.price.toLocaleString()}</span>
                        <i className="bi bi-whatsapp text-success fs-5"></i>
                      </div>
                    </div>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>

        {/* ========== ENHANCED FOOTER with Phone & Email ========== */}
        <footer className="py-5 mt-4" style={{ background: "#050505", borderTop: "1px solid #1f1f1f" }}>
          <div className="container">
            <div className="row gy-4">
              {/* Brand & Tagline */}
              <div className="col-lg-4 col-md-6">
                <h3 className="navbar-brand-custom fs-2 mb-2">MY</h3>
                <p className="text-secondary small mb-3">Premium men's accessories crafted for the modern icon. Personalized designs, unmatched quality.</p>
                <div className="d-flex gap-3 mt-2">
                  <a href="#" className="social-icon"><i className="bi bi-instagram"></i></a>
                  <a href="#" className="social-icon"><i className="bi bi-facebook"></i></a>
                  <a href="#" className="social-icon"><i className="bi bi-twitter-x"></i></a>
                  <a href="#" className="social-icon"><i className="bi bi-tiktok"></i></a>
                </div>
              </div>

              {/* Quick Links */}
              <div className="col-lg-2 col-md-6">
                <h5 className="gold-text fw-semibold mb-3" style={{ fontSize: "1rem" }}>EXPLORE</h5>
                <ul className="list-unstyled">
                  <li className="mb-2"><a href="#" className="footer-link small">New Arrivals</a></li>
                  <li className="mb-2"><a href="#" className="footer-link small">Best Sellers</a></li>
                  <li className="mb-2"><a href="#" className="footer-link small">Personalized Gifts</a></li>
                  <li className="mb-2"><a href="#" className="footer-link small">Offers</a></li>
                </ul>
              </div>

              {/* Contact Info - Phone & Email */}
              <div className="col-lg-3 col-md-6">
                <h5 className="gold-text fw-semibold mb-3" style={{ fontSize: "1rem" }}>CONTACT US</h5>
                <ul className="list-unstyled">
                  <li className="mb-3 d-flex align-items-center gap-2">
                    <i className="bi bi-whatsapp text-success fs-6"></i>
                    <a href="https://wa.me/923001234567" className="footer-link small">+92 300 1234567</a>
                  </li>
                  <li className="mb-3 d-flex align-items-center gap-2">
                    <i className="bi bi-telephone-fill gold-text fs-6"></i>
                    <span className="text-secondary small">+92 21 3456789</span>
                  </li>
                  <li className="mb-3 d-flex align-items-center gap-2">
                    <i className="bi bi-envelope-fill gold-text fs-6"></i>
                    <a href="mailto:info@amx.pk" className="footer-link small">info@amx.pk</a>
                  </li>
                  <li className="mb-2 d-flex align-items-center gap-2">
                    <i className="bi bi-geo-alt-fill text-secondary fs-6"></i>
                    <span className="text-secondary small">DHA Phase 8, Karachi, Pakistan</span>
                  </li>
                </ul>
              </div>

              {/* Business Hours */}
              <div className="col-lg-3 col-md-6">
                <h5 className="gold-text fw-semibold mb-3" style={{ fontSize: "1rem" }}>BUSINESS HOURS</h5>
                <p className="text-secondary small mb-1">Mon - Fri: 11:00 AM – 9:00 PM</p>
                <p className="text-secondary small mb-3">Sat - Sun: 2:00 PM – 10:00 PM</p>
                <p className="text-muted small mt-2"><i className="bi bi-shield-check"></i> 100% Authentic</p>
              </div>
            </div>

            <hr className="my-4" style={{ background: "#222" }} />
            <div className="row align-items-center">
              <div className="col-md-6 text-center text-md-start">
                <p className="mb-0 text-secondary small">© 2026 MY ACCESSORIES STORE — Premium Men's Accessories | All rights reserved</p>
              </div>
              <div className="col-md-6 text-center text-md-end mt-2 mt-md-0">
                <p className="mb-0 text-secondary small">
                  <i className="bi bi-credit-card me-1"></i> Secure payments | 
                  <i className="bi bi-truck ms-2 me-1"></i> Express shipping
                </p>
              </div>
            </div>
          </div>
        </footer>

        {/* WhatsApp Inquiry Modal - Appears when product is clicked */}
        {modalVisible && selectedProduct && (
          <div className="modal fade show d-block" tabIndex="-1" role="dialog" style={{ backgroundColor: "rgba(0,0,0,0.9)", backdropFilter: "blur(3px)" }}>
            <div className="modal-dialog modal-dialog-centered" role="document">
              <div className="modal-content modal-content-custom">
                <div className="modal-header border-bottom border-secondary">
                  <h5 className="modal-title fw-bold gold-text">
                    <i className="bi bi-gem me-2"></i> {selectedProduct.name}
                  </h5>
                  <button type="button" className="btn-close btn-close-white" onClick={closeModal} aria-label="Close"></button>
                </div>
                <div className="modal-body">
                  <div className="row g-3">
                    <div className="col-12 text-center">
                      <img 
                        src={selectedProduct.image} 
                        alt={selectedProduct.name} 
                        className="img-fluid rounded-3 mb-2" 
                        style={{ maxHeight: "180px", width: "auto", objectFit: "cover", borderRadius: "16px" }}
                      />
                    </div>
                    <div className="col-12">
                      <p className="text-white-50 mb-1"><strong>Category:</strong> {selectedProduct.category}</p>
                      <p className="text-white-50 mb-1"><strong>Description:</strong> {selectedProduct.description}</p>
                      <div className="d-flex justify-content-between align-items-center mt-2">
                        <span className="price-tag fs-3">₨ {selectedProduct.price.toLocaleString()}</span>
                        <span className="badge bg-dark border border-warning px-3 py-2">Limited stock</span>
                      </div>
                      <hr className="bg-secondary" />
                      <div className="text-center mt-3">
                        <p className="small text-secondary mb-2">📞 Get instant details & place order directly</p>
                        <a 
                          href={getWhatsAppLink()} 
                          target="_blank" 
                          rel="noopener noreferrer"
                          className="btn btn-whatsapp w-100 d-flex align-items-center justify-content-center gap-2"
                        >
                          <i className="bi bi-whatsapp fs-5"></i> Chat on WhatsApp
                        </a>
                        <p className="mt-3 text-secondary" style={{ fontSize: "0.7rem" }}>Clicking will open WhatsApp with pre-filled product inquiry.</p>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="modal-footer border-top border-secondary">
                  <button type="button" className="btn btn-outline-secondary" onClick={closeModal}>Continue Shopping</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
