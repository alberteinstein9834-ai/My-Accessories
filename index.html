<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>MY Accessories Store - Firebase Live | Responsive Nav</title>
    <!-- Bootstrap 5 + Icons + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
      * { font-family: "Inter", sans-serif; }
      
      /* Desktop: horizontal scroll */
      @media (min-width: 992px) {
  .category-scroll {
    overflow-x: hidden;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    white-space: normal;
    gap: 8px;
  }

  .category-btn {
    display: inline-block;
    white-space: nowrap;
  }
}
        .category-scroll::-webkit-scrollbar {
          height: 4px;
        }
        .category-scroll::-webkit-scrollbar-track {
          background: #1a1a1a;
          border-radius: 10px;
        }
        .category-scroll::-webkit-scrollbar-thumb {
          background: #d4af37;
          border-radius: 10px;
        }
        .category-btn {
          display: inline-block;
          white-space: nowrap;
        }
      
      
      /* Mobile/Tablet: vertical scroll (columns) */
      @media (max-width: 991px) {
        .category-scroll {
          overflow-x: hidden;
          overflow-y: auto;
          max-height: 280px;
          display: flex;
          flex-direction: column;
          flex-wrap: nowrap;
          width: 100%;
        }
        .category-btn {
          width: 100%;
          text-align: left;
          margin: 4px 0;
        }
        .category-scroll::-webkit-scrollbar {
          width: 4px;
        }
        .category-scroll::-webkit-scrollbar-track {
          background: #1a1a1a;
          border-radius: 10px;
        }
        .category-scroll::-webkit-scrollbar-thumb {
          background: #d4af37;
          border-radius: 10px;
        }
      }
      
      body { background: #000000; margin: 0; padding: 0; color: #f0f0f0; }
      .card-bg-dark { background: #111111 !important; border: 1px solid #2a2a2a; transition: all 0.25s ease; }
      .card-bg-dark:hover { transform: translateY(-6px); border-color: #b8860b; box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.8); background: #181818 !important; }
      .product-card { cursor: pointer; border-radius: 20px; overflow: hidden; transition: 0.2s; }
      .category-btn { background: transparent; border: 1px solid #333; color: #ddd; font-weight: 500; padding: 8px 20px; border-radius: 40px; margin: 5px 6px; transition: all 0.2s; font-size: 0.85rem; white-space: nowrap; }
      .category-btn:hover, .category-btn.active { background: #b8860b; border-color: #b8860b; color: #000000; font-weight: 600; box-shadow: 0 4px 12px rgba(184, 134, 11, 0.3); }
      .navbar-brand-custom { font-weight: 800; font-size: 2rem; letter-spacing: -0.5px; background: linear-gradient(135deg, #e4c580, #b8860b); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .gold-text { color: #d4af37; }
      .price-tag { font-weight: 700; font-size: 1.4rem; color: #f5c542; }
      .section-title { border-left: 5px solid #d4af37; padding-left: 18px; margin-bottom: 28px; font-weight: 700; }
      .modal-content-custom { background: #0f0f0f; border: 1px solid #2c2c2c; border-radius: 28px; color: white; }
      .btn-whatsapp { background-color: #25d366; border: none; font-weight: 600; padding: 12px 0; border-radius: 50px; color: #000; transition: 0.2s; }
      .btn-whatsapp:hover { background-color: #20b859; transform: scale(1.02); color: #000; box-shadow: 0 6px 14px rgba(37, 211, 102, 0.3); }
      footer { background: #030303; border-top: 1px solid #222; }
      .img-placeholder { background: #1e1e1e; object-fit: contain; width: 100%; height: 220px; transition: 0.2s; }
      .badge-cat { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; }
      .card-title { font-weight: 700; font-size: 1.1rem; }
      hr { opacity: 0.3; }
      .footer-link { color: #aaa; text-decoration: none; transition: 0.2s; }
      .footer-link:hover { color: #d4af37; }
      .social-icon { background: #1e1e1e; display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; transition: 0.2s; color: #ccc; }
      .social-icon:hover { background: #d4af37; color: #000; transform: translateY(-3px); }
      .nav-categories-wrapper { background: #0a0a0a; border-radius: 60px; padding: 6px 12px; border: 1px solid #222; }
      @media (max-width: 991px) {
        .nav-categories-wrapper { background: transparent; border: none; padding: 0; border-radius: 0; }
        .category-btn { font-size: 0.85rem; padding: 10px 16px; }
      }
      .navbar-toggler-custom { background: #1a1a1a; border: 1px solid #b8860b; color: #d4af37; }
      .nav-link-custom { color: #ccc; transition: 0.2s; font-weight: 500; }
      .nav-link-custom:hover { color: #d4af37; }
      .admin-btn { background: #1f1f1f; border: 1px solid #d4af37; color: #d4af37; border-radius: 40px; padding: 6px 18px; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
      .admin-btn:hover { background: #d4af37; color: #000; border-color: #d4af37; }
      .crud-icon { cursor: pointer; transition: 0.2s; opacity: 0.7; }
      .crud-icon:hover { opacity: 1; transform: scale(1.05); }
      .form-control-custom { background: #1e1e1e; border: 1px solid #333; color: white; }
      .form-control-custom:focus { background: #252525; color: white; border-color: #d4af37; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3); }
      .floating-add-btn { position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: #d4af37; color: #000; border-radius: 60px; padding: 14px 24px; font-weight: bold; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5); border: none; transition: 0.2s; }
      .floating-add-btn:hover { background: #e4c580; transform: scale(1.05); color: #000; }
      @media (max-width: 991px) {
        .floating-add-btn { bottom: 20px; right: 20px; padding: 10px 18px; font-size: 0.9rem; }
      }
      .verified-badge { background: #1f3a1f; color: #2ecc71; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; margin-left: 12px; }
      .upload-area { border: 2px dashed #444; border-radius: 16px; padding: 12px; text-align: center; transition: 0.2s; cursor: pointer; background: #111; }
      .upload-area:hover { border-color: #d4af37; background: #1a1a1a; }
      .image-preview-circle { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; border: 2px solid #d4af37; background: #1a1a1a; }
      .category-manager-btn { background: #2a2a2a; border: none; color: #d4af37; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; margin-left: 8px; transition: 0.2s; }
      .category-manager-btn:hover { background: #d4af37; color: #000; }
      .category-item-badge { background: #1e1e1e; border: 1px solid #444; border-radius: 40px; padding: 5px 12px; display: inline-flex; align-items: center; gap: 8px; margin: 4px; }
      .delete-cat-icon { cursor: pointer; color: #ff6b6b; font-size: 0.8rem; transition: 0.2s; }
      .delete-cat-icon:hover { color: #ff0000; transform: scale(1.1); }
      @media (max-width: 576px) {
        .navbar-brand-custom { font-size: 1.5rem !important; }
        .section-title { font-size: 1.3rem !important; }
        .price-tag { font-size: 1.1rem !important; }
        .floating-add-btn { bottom: 15px; right: 15px; padding: 10px 14px; font-size: 12px; }
        .card-title { font-size: 1rem; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      // ========== FIREBASE CONFIGURATION ==========
      const firebaseConfig = {
        apiKey: "AIzaSyBZErW_ewvYg8MRlyKm6W4yBBW71j65Whc",
        authDomain: "accessories-eceea.firebaseapp.com",
        projectId: "accessories-eceea",
        storageBucket: "accessories-eceea.firebasestorage.app",
        messagingSenderId: "1035901432494",
        appId: "1:1035901432494:web:f60315ee8ec85923f9f33f"
      };
      
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const db = firebase.firestore();
      const productsCollection = db.collection("products");
      const categoriesCollection = db.collection("categories");
      
      // Helper: Convert file to Base64
      const fileToBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };
      
      // Default data
      const DEFAULT_CATEGORIES = ["MEN BRACELET", "WOMEN BRACELET", "RINGS"];
      const INITIAL_PRODUCTS = [
        { name: "Warrior Leather Bracelet", category: "MEN BRACELET", price: 1500, image: "https://picsum.photos/id/20/400/300", description: "Handcrafted genuine leather with steel clasp. Durable and stylish for everyday wear." },
        { name: "Onyx Pendant Necklace", category: "MEN BRACELET", price: 1500, image: "https://picsum.photos/id/26/400/300", description: "Black onyx stone, modern masculine style." },
        { name: "Stealth Hoop Earrings", category: "RINGS", price: 1500, image: "https://picsum.photos/id/29/400/300", description: "Matte black hoops, surgical steel." },
        { name: "Carbon Fiber Ring", category: "RINGS", price: 1500, image: "https://picsum.photos/id/36/400/300", description: "Ultra-light carbon fiber ring." },
        { name: "Tungsten Carbide Ring", category: "RINGS", price: 1500, image: "https://picsum.photos/id/133/400/300", description: "Scratch-resistant, dome profile." },
      ];
      
      async function seedInitialData() {
        const catsSnapshot = await categoriesCollection.get();
        if (catsSnapshot.empty) {
          for (let cat of DEFAULT_CATEGORIES) {
            await categoriesCollection.add({ name: cat, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          }
        }
        const prodSnapshot = await productsCollection.get();
        if (prodSnapshot.empty) {
          for (let prod of INITIAL_PRODUCTS) {
            await productsCollection.add({ ...prod, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          }
        }
      }
      seedInitialData();
      
      // ========== REACT APP ==========
      const WHATSAPP_NUMBER = "923704931949";
      let VERIFIED_EMAILS = JSON.parse(localStorage.getItem("verified_emails")) || ["shayanirshad123s@gmail.com"];
      
      const App = () => {
        const [products, setProducts] = React.useState([]);
        const [categories, setCategories] = React.useState([]);
        const [selectedCategory, setSelectedCategory] = React.useState("ALL");
        const [detailModalVisible, setDetailModalVisible] = React.useState(false);
        const [selectedProduct, setSelectedProduct] = React.useState(null);
        const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
        const [searchTerm, setSearchTerm] = React.useState("");
        const [showSearch, setShowSearch] = React.useState(false);
        const [loading, setLoading] = React.useState(true);
        
        // Admin states
        const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
        const [adminEmail, setAdminEmail] = React.useState("");
        const [showAdminLoginModal, setShowAdminLoginModal] = React.useState(false);
        const [loginEmailInput, setLoginEmailInput] = React.useState("");
        const [loginError, setLoginError] = React.useState("");
        
        // CRUD Modal
        const [crudModalOpen, setCrudModalOpen] = React.useState(false);
        const [editingProduct, setEditingProduct] = React.useState(null);
        const [formData, setFormData] = React.useState({
          name: "", category: "", price: "", image: "", description: ""
        });
        const [isAdding, setIsAdding] = React.useState(false);
        const [uploadingImage, setUploadingImage] = React.useState(false);
        const [selectedImageFile, setSelectedImageFile] = React.useState(null);
        
        // Category Management Modal
        const [showCategoryModal, setShowCategoryModal] = React.useState(false);
        const [newCategoryName, setNewCategoryName] = React.useState("");
        const [categoryError, setCategoryError] = React.useState("");
        
        // Firebase real-time listeners
        React.useEffect(() => {
          const unsubscribeCats = categoriesCollection.orderBy("name").onSnapshot((snapshot) => {
            const catsList = snapshot.docs.map(doc => doc.data().name);
            if (catsList.length === 0) setCategories([]);
            else setCategories(catsList);
          });
          
          const unsubscribeProds = productsCollection.orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const prodList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setProducts(prodList);
            setLoading(false);
          });
          
          return () => {
            unsubscribeCats();
            unsubscribeProds();
          };
        }, []);
        
        const categoryList = ["ALL", ...categories];
        
        const filteredProducts = React.useMemo(() => {
          return products.filter((product) => {
            const categoryMatch = selectedCategory === "ALL" || product.category === selectedCategory;
            const searchMatch = 
              product.name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
              product.description?.toLowerCase().includes(searchTerm.toLowerCase()) ||
              product.category?.toLowerCase().includes(searchTerm.toLowerCase());
            return categoryMatch && searchMatch;
          });
        }, [selectedCategory, products, searchTerm]);
        
        // Admin functions
        const promptAdminLogin = () => setShowAdminLoginModal(true);
        const handleAdminLoginSubmit = (e) => {
          e.preventDefault();
          const email = loginEmailInput.trim().toLowerCase();
          if (VERIFIED_EMAILS.includes(email)) {
            setIsAdminLoggedIn(true);
            setAdminEmail(email);
            setShowAdminLoginModal(false);
            setLoginEmailInput("");
            setLoginError("");
          } else {
            setLoginError("❌ Access Denied. Use verified email");
          }
        };
        const handleLogout = () => {
          setIsAdminLoggedIn(false);
          setAdminEmail("");
          setCrudModalOpen(false);
          setShowCategoryModal(false);
        };
        
        // Image upload handler
        const fileInputRef = React.useRef(null);
        const triggerGallery = () => fileInputRef.current?.click();
        const handleImageUpload = async (e) => {
  const file = e.target.files[0];

  if (!file) return;

  if (!file.type.startsWith("image/")) {
    alert("❌ Please select an image file");
    return;
  }

  setUploadingImage(true);

  try {
    const compressedFile = await imageCompression(file, {
      maxSizeMB: 0.3,
      maxWidthOrHeight: 1000,
      useWebWorker: true,
    });

    const base64Image = await fileToBase64(compressedFile);

    setFormData(prev => ({
      ...prev,
      image: base64Image
    }));

    setSelectedImageFile(compressedFile);

    alert(
      `✅ Image compressed from ${(file.size / 1024 / 1024).toFixed(2)}MB to ${(compressedFile.size / 1024 / 1024).toFixed(2)}MB`
    );

  } catch (err) {
    alert("Upload failed: " + err.message);
  } finally {
    setUploadingImage(false);
  }
};
        
        // Product CRUD
        const openAddProductModal = () => {
          if (!isAdminLoggedIn) { promptAdminLogin(); return; }
          if (categories.length === 0) { 
            alert("⚠️ Please add at least one category first via Manage Categories."); 
            return; 
          }
          setIsAdding(true);
          setEditingProduct(null);
          setSelectedImageFile(null);
          setFormData({
            name: "",
            category: categories[0] || "MEN BRACELET",
            price: "",
            image: "https://picsum.photos/id/1/400/300",
            description: "",
          });
          setCrudModalOpen(true);
        };
        
        const openEditProductModal = (product) => {
          if (!isAdminLoggedIn) { promptAdminLogin(); return; }
          setIsAdding(false);
          setEditingProduct(product);
          setSelectedImageFile(null);
          setFormData({ 
            name: product.name, 
            category: product.category, 
            price: product.price.toString(), 
            image: product.image, 
            description: product.description 
          });
          setCrudModalOpen(true);
        };
        
        const saveProduct = async () => {
          if (!isAdminLoggedIn) { promptAdminLogin(); return; }
          
          if (!formData.name.trim()) { alert("Product name required"); return; }
          if (!formData.price || parseFloat(formData.price) <= 0) { alert("Valid price required"); return; }
          if (!formData.image.trim()) { alert("Image required"); return; }
          if (!formData.description.trim()) { alert("Description required"); return; }
          
          const priceNum = parseFloat(formData.price);
          
          try {
            let finalImageUrl = formData.image;
            if (selectedImageFile) {
              finalImageUrl = formData.image;
            }
            
            const productData = {
              name: formData.name.trim(),
              category: formData.category,
              price: priceNum,
              image: finalImageUrl,
              description: formData.description.trim(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            };
            
            if (isAdding) {
              await productsCollection.add({ 
                ...productData, 
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
              });
              alert(`✅ "${formData.name.trim()}" added successfully!`);
            } else {
              await productsCollection.doc(editingProduct.id).update(productData);
              alert(`✏️ "${formData.name.trim()}" updated successfully!`);
            }
            setCrudModalOpen(false);
            setSelectedImageFile(null);
          } catch (err) {
            console.error("Save error:", err);
            alert("Error saving product: " + err.message);
          }
        };
        
        const deleteProduct = async (productId, productName) => {
          if (!isAdminLoggedIn) { promptAdminLogin(); return; }
          if (window.confirm(`⚠️ Permanently delete "${productName}"?`)) {
            try {
              await productsCollection.doc(productId).delete();
              alert(`🗑️ "${productName}" permanently removed.`);
            } catch (err) { 
              alert("Delete failed: " + err.message); 
            }
          }
        };
        
        // Category Management
        const openCategoryManager = () => {
          if (!isAdminLoggedIn) { promptAdminLogin(); return; }
          setNewCategoryName("");
          setCategoryError("");
          setShowCategoryModal(true);
        };
        
        const addNewCategory = async () => {
          const newCat = newCategoryName.trim().toUpperCase();
          if (!newCat) { setCategoryError("Category name required"); return; }
          if (categories.includes(newCat)) { setCategoryError("Category already exists!"); return; }
          try {
            await categoriesCollection.add({ 
              name: newCat, 
              createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            });
            setNewCategoryName("");
            setCategoryError("");
            alert(`✅ Category "${newCat}" added.`);
          } catch (err) { 
            alert("Failed to add category: " + err.message); 
          }
        };
        
        const deleteCategory = async (catToDelete) => {
          if (catToDelete === "ALL") return;
          if (!isAdminLoggedIn) return;
          const productsUsing = products.filter(p => p.category === catToDelete);
          let confirmMsg = `⚠️ Delete category "${catToDelete}"?`;
          if (productsUsing.length > 0) {
            confirmMsg = `⚠️ ${productsUsing.length} product(s) use this category. Products will be moved to first available category. Continue?`;
          }
          if (!window.confirm(confirmMsg)) return;
          try {
            const catSnapshot = await categoriesCollection.where("name", "==", catToDelete).get();
            if (!catSnapshot.empty) {
              await catSnapshot.docs[0].ref.delete();
            }
            
            if (productsUsing.length > 0) {
              const fallbackCat = categories.find(c => c !== catToDelete) || categories[0];
              for (let prod of productsUsing) {
                await productsCollection.doc(prod.id).update({ category: fallbackCat });
              }
            }
            if (selectedCategory === catToDelete) setSelectedCategory("ALL");
            alert(`🗑️ Category "${catToDelete}" deleted.`);
          } catch (err) { 
            alert("Error deleting category: " + err.message); 
          }
        };
        
        // Modal handlers
        const openProductDetailModal = (product) => {
          setSelectedProduct(product);
          setDetailModalVisible(true);
        };
        const closeDetailModal = () => {
          setDetailModalVisible(false);
          setSelectedProduct(null);
        };
        const getWhatsAppLinkForProduct = () => {
          if (!selectedProduct) return "#";
          const message = `Hello MY Accessories! I would like to purchase *${selectedProduct.name}* (₨${selectedProduct.price?.toLocaleString()}). Product: ${selectedProduct.description}. Please share availability.`;
          return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
        };
        
        const handleFormChange = (e) => {
          const { name, value } = e.target;
          setFormData(prev => ({ ...prev, [name]: value }));
        };
        
        // Category Filters Component - Responsive
        const CategoryFilters = () => (
          <div className="category-scroll">
            {categoryList.map((cat) => (
              <button key={cat} className={`category-btn ${selectedCategory === cat ? "active" : ""}`} onClick={() => setSelectedCategory(cat)}>
                {cat}
              </button>
            ))}
            {isAdminLoggedIn && (
              <button onClick={openCategoryManager} className="category-manager-btn" style={{ marginTop: "8px" }}>
                <i className="bi bi-gear-fill me-1"></i> Manage Cats
              </button>
            )}
          </div>
        );
        
        if (loading) {
          return (
            <div className="d-flex justify-content-center align-items-center" style={{ height: "100vh", background: "#000" }}>
              <div className="text-center">
                <div className="spinner-border text-warning mb-3" role="status"></div>
                <p className="text-secondary">Loading real-time collection...</p>
              </div>
            </div>
          );
        }
        
        return (
          <div style={{ backgroundColor: "#000000", minHeight: "100vh" }}>
            <input type="file" ref={fileInputRef} style={{ display: "none" }} accept="image/*" onChange={handleImageUpload} />
            
            {/* Navbar */}
            <nav className="navbar navbar-expand-lg sticky-top" style={{ background: "#010101", borderBottom: "1px solid #222", padding: "0.5rem 0" }}>
              <div className="container">
                <a className="navbar-brand d-flex align-items-center gap-2" href="#" style={{ textDecoration: "none" }}>
                  <span className="navbar-brand-custom display-6 fw-bold" style={{ fontSize: "1.9rem" }}>MY</span>
                  <span style={{ height: "30px", width: "1px", background: "#333", margin: "0 5px" }}></span>
                  <span className="text-white-50 fw-light" style={{ fontSize: "0.9rem", letterSpacing: "1px" }}>ACCESSORIES STORE</span>
                </a>
                <button className="navbar-toggler navbar-toggler-custom" type="button" onClick={() => setMobileMenuOpen(!mobileMenuOpen)} style={{ background: "#111", border: "1px solid #b8860b", borderRadius: "12px", padding: "8px 12px" }}>
                  <i className={`bi ${mobileMenuOpen ? "bi-x-lg" : "bi-grid-3x3-gap-fill"} gold-text`}></i>
                </button>
                <div className={`collapse navbar-collapse ${mobileMenuOpen ? "show" : ""}`}>
